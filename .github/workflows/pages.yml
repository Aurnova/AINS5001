# Populi shell + MyST Jupyter Book: single site at https://aurnova.github.io/AINS5001/
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Build Jupyter Book with the same subpath the site will use (GitHub project Pages).
# Set vars.AIMA_REPO to override the aima monorepo (e.g. a public fork). Default: CastaliaInstitute/aima
# That repo is private — set secret AIMA_CLONE_TOKEN (PAT, Contents: read) so checkout can cross orgs.
env:
  JUPYTER_BASE_URL: /AINS5001/jupyter-book/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AINS5001
        uses: actions/checkout@v4

      - name: Checkout aima (MyST + lecture sources)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.AIMA_REPO || 'CastaliaInstitute/aima' }}
          path: aima
          fetch-depth: 1
          token: ${{ secrets.AIMA_CLONE_TOKEN != '' && secrets.AIMA_CLONE_TOKEN || github.token }}

      - name: Set up Node (aima — match aima’s toolchain)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aima/package-lock.json

      - name: Build Jupyter Book for this Pages host
        working-directory: aima
        env:
          BASE_URL: ${{ env.JUPYTER_BASE_URL }}
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          npm ci && npm run pages:jupyter-book

      - name: Strip CNAME from static export (stay on github.io)
        run: rm -f aima/course/myst/_build/html/CNAME

      - name: Set up Node (AINS5001)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install and build Populi shell
        run: npm ci && npm run build

      - name: Assemble site (Jupyter Book + optional IMS CC + delivery docs)
        run: |
          mkdir -p dist/jupyter-book
          cp -R aima/course/myst/_build/html/. dist/jupyter-book/
          if [ -f course.imscc ]; then cp course.imscc dist/course.imscc; fi
          if [ -d docs ] && [ -n "$(ls -A docs 2>/dev/null)" ]; then
            mkdir -p dist/docs
            cp -R docs/. dist/docs/
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
