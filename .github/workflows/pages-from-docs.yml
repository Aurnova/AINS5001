# GitHub Pages for myst-imscc-style repos: site root = contents of docs/
name: Deploy Pages (docs from IMS CC)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'course.imscc'
      - '.github/workflows/pages-from-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload docs as site root
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
